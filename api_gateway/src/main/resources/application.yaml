server:
  port: 8080

jwt:
  secret: 

spring:
  config:
    import:
      - optional:configserver:http://localhost:8888
      - classpath:circuitbreaker-config.yaml
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/v1/account/**
          filters:
            - name: CircuitBreaker
              args:
                name: accountServiceCB
                fallbackUri: forward:/fallback/account
        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/api/v1/audit/**
        - id: authentication-service
          uri: lb://authentication-service
          predicates:
            - Path=/api/v1/authentication/**
          filters:
            - name: CircuitBreaker
              args:
                name: authenticationServiceCB
                fallbackUri: forward:/fallback/authentication
        - id: loan-service
          uri: lb://loan-service
          predicates:
            - Path=/api/v1/loan/**
          filters:
            - name: CircuitBreaker
              args:
                name: loanServiceCB
                fallbackUri: forward:/fallback/loan
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notification/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback/notification
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payment/**
          filters:
            - name: CircuitBreaker
              args:
                name: paymentServiceCB
                fallbackUri: forward:/fallback/payment
        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/api/v1/reporting/**
        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/api/v1/transaction/**
          filters:
            - name: CircuitBreaker
              args:
                name: transactionServiceCB
                fallbackUri: forward:/fallback/transaction
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/user/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    level: "%5p [${spring.application.name:},traceId=%X{traceId},spanId=%X{spanId}]"
